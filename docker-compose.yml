services:

  whoami:
    image: traefik/whoami
    container_name: whoami

    ports:
      - "8080:80"

    networks:
      - backend


  mongodb:

    image: mongo:7

    container_name: mongodb

    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

    volumes:
      - mongo_data:/data/db

    networks:
      - backend

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - backend


  gateway:

    build: ./gateway-service

    container_name: gateway

    ports:
      - "8000:8000"

    depends_on:
      - mongodb
      - redis

    networks:
      - backend



  transcription:
    build: ./transcription-service
    container_name: transcription
    ports:
      - "8001:8001"
    networks:
      - backend


  asterisk:
    image: mlan/asterisk:latest
    container_name: asterisk

    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "8088:8088"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./asterisk/configs:/etc/asterisk
      - ./asterisk/recordings:/var/spool/asterisk/monitor

    networks:
      - backend

    restart: unless-stopped


volumes:

  mongo_data:


networks:

  backend:
    driver: bridge
